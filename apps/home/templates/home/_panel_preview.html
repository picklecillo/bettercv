<div style="display:flex; flex-direction:column; height:100%;">

  {% if shared_resume.resume_filename %}
  <div class="loaded-badge" style="margin-bottom:0.75rem;">
    <span class="loaded-badge-label">Loaded</span>
    <span>{{ shared_resume.resume_filename }}</span>
  </div>
  {% endif %}

  <div style="flex:1; min-height:0; overflow:hidden; border:1px solid var(--border); border-radius:3px;">
    <iframe
      srcdoc="{{ shared_html }}"
      title="Resume preview"
      style="width:100%; height:100%; border:none; display:block;"
    ></iframe>
  </div>

  <div style="flex-shrink:0; display:flex; gap:0.75rem; padding-top:1rem; border-top:1px solid var(--border); margin-top:1rem;">
    <button
      class="ghost-btn"
      hx-get="/resume/editor/"
      hx-target="#resume-panel"
      hx-swap="innerHTML"
    >Edit YAML</button>
    <form action="/resume/build/" method="post" style="flex:1; margin:0; display:flex; justify-content:flex-end;">
      {% csrf_token %}
      <button type="submit" class="action-btn">Download PDF</button>
    </form>
  </div>

</div>
