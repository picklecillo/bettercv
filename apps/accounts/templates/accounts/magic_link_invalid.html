<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BetterCV — Invalid Link</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Outfit', sans-serif; background: #f5f0e8; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .card { background: #fff; border: 1px solid #e2ddd4; border-radius: 4px; padding: 2.5rem; max-width: 360px; text-align: center; }
    h1 { font-size: 1.25rem; margin: 0 0 0.75rem; color: #1a1a2e; }
    p { font-size: 0.875rem; color: #3d3d5c; margin: 0 0 1.5rem; }
    a { display: inline-block; background: #1a1a2e; color: #f5f0e8; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; padding: 0.75rem 1.5rem; border-radius: 3px; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Link expired or already used</h1>
    <p>Magic links can only be used once and expire after 15 minutes.</p>
    <a href="/accounts/login/">Back to sign in</a>
  </div>
</body>
</html>
