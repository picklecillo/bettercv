  <style type="text/tailwindcss">
    :root {
      --ink:     #1a1a2e;
      --ink-mid: #3d3d5c;
      --cream:   #f5f0e8;
      --gold:    #c9a84c;
      --gold-lt: #e8d9a8;
      --surface: #ffffff;
      --border:  #e2ddd4;
    }

    /* ── Split layout ── */
    .coach-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      padding: 2rem 2.5rem;
      max-width: 1400px;
      margin: 0 auto;
      height: calc(100vh - 80px);
      box-sizing: border-box;
    }

    @media (max-width: 900px) {
      .coach-grid { grid-template-columns: 1fr; height: auto; }
    }

    /* ── Panels ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      box-shadow: 0 1px 3px rgba(26,26,46,0.06);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-mid);
      padding: 1rem 1.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Left: CV text ── */
    .cv-text {
      padding: 1.25rem 1.5rem;
      font-size: 0.82rem;
      line-height: 1.8;
      color: var(--ink-mid);
      white-space: pre-wrap;
      word-break: break-word;
      overflow-y: auto;
      flex: 1;
    }

    /* ── Right: experience list + chat ── */
    .right-panel {
      display: flex;
      flex-direction: column;
    }

    .experience-list {
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .exp-btn {
      font-family: 'Outfit', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 0.4rem 0.875rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--cream);
      color: var(--ink);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-align: left;
    }
    .exp-btn:hover { border-color: var(--gold); background: var(--surface); }
    .exp-btn.selected { border-color: var(--gold); background: var(--gold); color: var(--ink); }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .chat-placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #c5bfb4;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Start-over link ── */
    .start-over {
      flex-shrink: 0;
      padding: 0.75rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
    }

    .start-over a {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-mid);
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.15s;
    }
    .start-over a:hover { opacity: 1; }
  </style>

  <div class="coach-grid">

    <!-- Left: original CV -->
    <div class="panel">
      <div class="panel-header">Your CV</div>
      <div class="cv-text">{{ cv_text }}</div>
    </div>

    <!-- Right: experience list + chat -->
    <div class="panel right-panel">
      <div class="panel-header">Work Experiences</div>

      <div class="experience-list">
        {% csrf_token %}
        {% for exp in experiences %}
        <button
          class="exp-btn"
          hx-post="/coach/chat/"
          hx-target="#chat-transcript"
          hx-swap="beforeend"
          hx-vals='{"exp_index": "{{ forloop.counter0 }}"}'
          hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
          onclick="document.querySelectorAll('.exp-btn').forEach(b=>b.classList.remove('selected')); this.classList.add('selected')">
          <strong>{{ exp.title }}</strong><br>
          <span style="opacity:0.7">{{ exp.company }} · {{ exp.dates }}</span>
        </button>
        {% endfor %}
      </div>

      <div id="chat-transcript" class="chat-area">
        <div class="chat-placeholder">Select a work experience to begin coaching</div>
      </div>

      <div class="start-over">
        <a href="/coach/">↩ Start over</a>
      </div>
    </div>

  </div>
