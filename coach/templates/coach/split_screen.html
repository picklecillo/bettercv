  <style type="text/tailwindcss">
    :root {
      --ink:     #1a1a2e;
      --ink-mid: #3d3d5c;
      --cream:   #f5f0e8;
      --gold:    #c9a84c;
      --gold-lt: #e8d9a8;
      --surface: #ffffff;
      --border:  #e2ddd4;
    }

    /* ── Split layout ── */
    .coach-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      padding: 2rem 2.5rem;
      max-width: 1400px;
      margin: 0 auto;
      height: calc(100vh - 80px);
      box-sizing: border-box;
    }

    @media (max-width: 900px) {
      .coach-grid { grid-template-columns: 1fr; height: auto; }
    }

    /* ── Panels ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      box-shadow: 0 1px 3px rgba(26,26,46,0.06);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-mid);
      padding: 1rem 1.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Left: CV text ── */
    .cv-text {
      padding: 1.25rem 1.5rem;
      font-size: 0.82rem;
      line-height: 1.8;
      color: var(--ink-mid);
      white-space: pre-wrap;
      word-break: break-word;
      overflow-y: auto;
      flex: 1;
    }

    /* ── Right: experience list + chat ── */
    .right-panel { display: flex; flex-direction: column; }

    .experience-list {
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .exp-btn {
      font-family: 'Outfit', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 0.4rem 0.875rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--cream);
      color: var(--ink);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-align: left;
    }
    .exp-btn:hover { border-color: var(--gold); background: var(--surface); }
    .exp-btn.selected { border-color: var(--gold); background: var(--gold); color: var(--ink); }

    /* ── Chat area ── */
    #chat-transcript {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .chat-placeholder {
      color: #c5bfb4;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      margin: auto;
    }

    /* ── Messages ── */
    .chat-msg {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .assistant-msg .msg-body {
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.875rem 1rem;
      font-size: 0.875rem;
      line-height: 1.7;
      color: var(--ink);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user-msg {
      align-self: flex-end;
      max-width: 85%;
    }

    .user-msg .msg-body {
      background: var(--ink);
      color: var(--cream);
      border-radius: 3px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .copy-btn {
      align-self: flex-end;
      font-family: 'Outfit', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-mid);
      background: none;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.25rem 0.6rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .copy-btn:hover { border-color: var(--gold); color: var(--ink); }

    /* ── Streaming status ── */
    .stream-status {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      padding: 0.5rem 0;
    }

    .dots {
      display: inline-block;
      animation: blink 1.2s step-start infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Chat input ── */
    .chat-input-area {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      padding: 0.875rem 1.5rem;
    }

    .chat-input-row {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }

    .chat-input {
      flex: 1;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.625rem 0.875rem;
      font-family: 'Outfit', sans-serif;
      font-size: 0.875rem;
      color: var(--ink);
      resize: none;
      outline: none;
      transition: border-color 0.15s;
    }
    .chat-input:focus { border-color: var(--gold); }
    .chat-input::placeholder { color: #b0a99a; }

    .send-btn {
      background: var(--ink);
      color: var(--cream);
      font-family: 'Outfit', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.625rem 1.25rem;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .send-btn:hover { background: var(--ink-mid); }
    .send-btn.htmx-request { opacity: 0.6; cursor: not-allowed; }

    /* ── Error ── */
    .result-error {
      border-left: 3px solid #e53e3e;
      background: #fff5f5;
      color: #742a2a;
      padding: 0.75rem 1rem;
      border-radius: 2px;
      font-size: 0.875rem;
    }

    /* ── Start over ── */
    .start-over {
      flex-shrink: 0;
      padding: 0.5rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
    }

    .start-over a {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-mid);
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 0.15s;
    }
    .start-over a:hover { opacity: 1; }
  </style>

  <div class="coach-grid">

    <!-- Left: original CV -->
    <div class="panel">
      <div class="panel-header">Your CV</div>
      <div class="cv-text">{{ cv_text }}</div>
    </div>

    <!-- Right: experience list + chat -->
    <div class="panel right-panel">
      <div class="panel-header">Work Experiences</div>

      <div class="experience-list">
        {% for exp in experiences %}
        <button
          class="exp-btn"
          hx-post="/coach/chat/"
          hx-target="#chat-transcript"
          hx-swap="beforeend"
          hx-vals='{"exp_index": "{{ forloop.counter0 }}"}'
          hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
          onclick="document.querySelectorAll('.exp-btn').forEach(b=>b.classList.remove('selected')); this.classList.add('selected'); document.getElementById('current-exp-index').value='{{ forloop.counter0 }}'; document.getElementById('chat-input-area').style.display='block';">
          <strong>{{ exp.title }}</strong><br>
          <span style="opacity:0.7; font-size:0.72rem">{{ exp.company }} &middot; {{ exp.dates }}</span>
        </button>
        {% endfor %}
      </div>

      <div id="chat-transcript">
        <div class="chat-placeholder">Select a work experience to begin</div>
      </div>

      <!-- Chat input — hidden until an experience is selected -->
      <div id="chat-input-area" style="display:none" class="chat-input-area">
        <form id="chat-form"
              hx-post="/coach/chat/"
              hx-target="#chat-transcript"
              hx-swap="beforeend"
              hx-encoding="multipart/form-data"
              hx-on::after-request="this.reset()">
          {% csrf_token %}
          <input type="hidden" name="exp_index" id="current-exp-index" value="">
          <input type="hidden" name="is_followup" value="1">
          <div class="chat-input-row">
            <textarea
              name="user_message"
              class="chat-input"
              rows="2"
              placeholder="Reply to continue the conversation…"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();this.form.requestSubmit();}"></textarea>
            <button type="submit" class="send-btn">Send</button>
          </div>
        </form>
      </div>

      <div class="start-over">
        <a href="/coach/">↩ Start over</a>
      </div>
    </div>

  </div>
